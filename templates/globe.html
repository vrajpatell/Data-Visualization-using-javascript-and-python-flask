<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earthquake 3D Globe</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/globe.css') }}">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Live Earthquake 3D Globe</h1>
        <p>Powered by <code>/api/earthquakes</code> with live refresh and cache fallback.</p>
      </div>
      <div class="nav-actions">
        <a href="/dashboard">Dashboard</a>
      </div>
    </header>

    <section class="controls-card">
      <div class="control">
        <label for="magMin">Minimum Magnitude</label>
        <input id="magMin" type="number" min="0" max="10" value="1" step="0.1">
      </div>

      <div class="control">
        <label for="recentHours">Recent Window (hours)</label>
        <select id="recentHours">
          <option value="24">Last 24 hours</option>
          <option value="12">Last 12 hours</option>
          <option value="6">Last 6 hours</option>
          <option value="3">Last 3 hours</option>
          <option value="0">All cached points</option>
        </select>
      </div>

      <div class="control">
        <label for="colorMode">Color By</label>
        <select id="colorMode">
          <option value="magnitude">Magnitude</option>
          <option value="depth">Depth</option>
        </select>
      </div>

      <div class="control">
        <label for="maxPoints">Maximum Points</label>
        <input id="maxPoints" type="number" min="50" max="2500" value="700" step="50">
      </div>

      <div class="control">
        <label for="heightScale">Point Height Scale</label>
        <input id="heightScale" type="range" min="0.6" max="2.5" step="0.1" value="1.2">
      </div>

      <div class="control inline-control">
        <label for="autoRefresh">Auto Refresh</label>
        <input id="autoRefresh" type="checkbox" checked>
      </div>

      <div class="control inline-control">
        <label for="autoRotate">Auto Rotate</label>
        <input id="autoRotate" type="checkbox" checked>
      </div>

      <button id="refreshButton" type="button">Refresh Now</button>

      <div class="legend" aria-label="Magnitude color legend">
        <span class="legend-item"><i style="background:#10b981"></i>M &lt; 2</span>
        <span class="legend-item"><i style="background:#f59e0b"></i>2-3.9</span>
        <span class="legend-item"><i style="background:#f97316"></i>4-5.9</span>
        <span class="legend-item"><i style="background:#ef4444"></i>6+</span>
      </div>

      <div class="stats" id="stats">Loading...</div>
    </section>

    <section class="globe-panel">
      <div id="statusBanner" class="status">Loading earthquake data...</div>
      <div id="globeViz"></div>
    </section>
  </div>

  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="{{ url_for('static', filename='js/globe.js') }}"></script>
</body>
</html>
